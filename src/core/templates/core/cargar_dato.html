{% extends 'core/base.html' %}
{% load static %}

{% block content %}
<main class="main-content">

    <a href="{% url 'fotos_mediciones' %}" class="back-link">← Volver a Documentos</a>

    <div class="mb-30">
        <h2 class="m-0" style="color: var(--azul-profundo);">📊 Cargar Datos Médicos</h2>
        <p class="text-muted mt-10">Extracción de datos del documento: <strong>{{ foto.imagen.name }}</strong></p>
    </div>

    <div class="card-sobria" style="max-width: 600px; margin: 0 auto; padding: 35px;">
        
        <form method="POST" action="{% url 'cargar_dato' foto.id %}" id="form-medicion">
            {% csrf_token %}
            
            <div class="form-group mb-20">
                <label>Tipo de Control</label>
                <select name="tipo" id="id_tipo_medicion" class="form-control" onchange="mostrarCampos()" required>
                    <option value="">-- Seleccionar --</option>
                    {% if 'presion' in controles_permitidos %}<option value="presion">Presión Arterial</option>{% endif %}
                    {% if 'glucosa' in controles_permitidos %}<option value="glucosa">Glucosa</option>{% endif %}
                    {% if 'peso' in controles_permitidos %}<option value="peso">Peso (Kg)</option>{% endif %}
                </select>
            </div>

            <div id="campos-presion" style="display: none;" class="mb-20">
                <div class="form-row-2">
                    <div>
                        <label>Sistólica (Alta)</label>
                        <input type="number" step="0.1" name="presion_sistolica" class="form-control" placeholder="Ej: 120">
                    </div>
                    <div>
                        <label>Diastólica (Baja)</label>
                        <input type="number" step="0.1" name="presion_diastolica" class="form-control" placeholder="Ej: 80">
                    </div>
                </div>
            </div>

            <div id="campos-peso" style="display: none;" class="mb-20">
                <label>Peso Registrado (Kg)</label>
                <input type="number" step="0.1" name="peso" class="form-control" placeholder="Ej: 72.5">
            </div>

            <div id="campos-glucosa" style="display: none;" class="mb-20">
                <label>Glucosa en Sangre (mg/dL)</label>
                <input type="number" step="0.1" name="glucosa" class="form-control" placeholder="Ej: 95">
            </div>

            <div class="form-group mb-30">
                <label>Observaciones del Tutor (Opcional)</label>
                <textarea name="observaciones" class="form-control" rows="3" placeholder="Ej: La medición se hizo en ayunas..."></textarea>
            </div>

            <button type="submit" class="btn-primary mt-10">💾 Guardar Medición</button>
        </form>
    </div>

</main>
{% endblock %}

{% block scripts %}
<script>
function mostrarCampos() {
    const tipo = document.getElementById('id_tipo_medicion').value;
    document.getElementById('campos-presion').style.display = (tipo === 'presion') ? 'block' : 'none';
    document.getElementById('campos-peso').style.display    = (tipo === 'peso')    ? 'block' : 'none';
    document.getElementById('campos-glucosa').style.display = (tipo === 'glucosa') ? 'block' : 'none';
}

document.getElementById('form-medicion').addEventListener('submit', function(e) {
    const tipo = document.getElementById('id_tipo_medicion').value;
    let inputs = [];

    // Seleccionamos los inputs activos según el tipo
    if (tipo === 'presion') {
        inputs = [document.querySelector('input[name="presion_sistolica"]'), document.querySelector('input[name="presion_diastolica"]')];
    } else if (tipo === 'peso') {
        inputs = [document.querySelector('input[name="peso"]')];
    } else if (tipo === 'glucosa') {
        inputs = [document.querySelector('input[name="glucosa"]')];
    }

    // Validación anti-negativos
    for (let input of inputs) {
        if (parseFloat(input.value) <= 0) {
            e.preventDefault();
            alert("❌ Error: Los valores médicos deben ser mayores a cero.");
            input.focus();
            return false;
        }
    }
});
</script>
{% endblock %}
