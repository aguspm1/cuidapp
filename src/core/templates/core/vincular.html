{% extends 'core/base.html' %}
{% load static %}
 
{% block content %}
<main class="main-content">
    <a href="{% url 'dashboard' %}" class="back-link">← Volver al Dashboard</a>
 
    <div class="card-sobria auth-card" style="margin: 0 auto;">
        <div class="text-center mb-20">
            <h2 class="m-0" style="color: var(--azul-profundo);">👥 Vincular Paciente</h2>
            <p class="text-muted mt-10">
                Ingresá el <strong>nombre de usuario</strong> de la persona que vas a cuidar para ver su medicación y turnos.
            </p>
        </div>
 
        <form method="POST">
            {% csrf_token %}
            
            <div class="form-group mb-20">
                <label for="username_paciente">Nombre de usuario del paciente</label>
                <input type="text" 
                       name="username_paciente" 
                       id="username_paciente" 
                       class="form-control"
                       placeholder="Ej: agustin2026" 
                       required>
            </div>
 
            <button type="submit" class="btn-primary mt-10">Vincular Cuenta</button>
        </form>
    </div>
 
</main>
{% endblock %}
