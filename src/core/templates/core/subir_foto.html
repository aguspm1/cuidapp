{% extends 'core/base.html' %}
{% load static %}

{% block content %}
<main class="main-content">
    <div class="d-flex justify-between align-center mb-30">
        <h2 class="m-0" style="color: var(--azul-profundo);">📤 Subir Nuevo Documento</h2>
        <a href="{% url 'fotos_mediciones' %}" class="btn-cancelar w-auto">← Volver a Documentos</a>
    </div>

    <div style="max-width: 600px; margin: 0 auto;">
        <div class="card-sobria" style="padding: 30px;">
            <h4 class="m-0 mb-20 text-muted" style="border-bottom: 1px solid var(--gris-borde); padding-bottom: 10px;">
                Seleccioná el archivo e indicá el tipo
            </h4>
            
            <form method="POST" enctype="multipart/form-data" action="{% url 'subir_foto' %}">
                {% csrf_token %}
                
                <div class="form-group mb-20">
                    <label>¿Qué tipo de documento vas a subir?</label>
                    <select name="tipo" class="form-control" required>
                        <option value="">-- Seleccionar tipo --</option>
                        
                        {% if perfil.requiere_control_presion or perfil.requiere_control_glucosa or perfil.requiere_control_peso %}
                            <option value="medicion">📊 Foto de Medición (Presión, Peso, Glucosa)</option>
                        {% endif %}
                        
                        <option value="receta">📄 Receta Médica</option>
                        <option value="indicacion">📌 Indicación / Estudio Clínico</option>
                    </select>
                    <small class="text-muted d-block mt-10">Si es una medición, tu tutor podrá extraer los valores numéricos para los gráficos.</small>
                </div>

                <div class="form-group mb-20">
                    <label>Seleccionar Archivo (Imagen o PDF)</label>
                    <input type="file" name="imagen" class="form-control" accept="image/*,.pdf" required style="padding: 8px;">
                </div>

                <div class="form-group mb-30">
                    <label>Nota aclaratoria (Opcional)</label>
                    <textarea name="nota_paciente" class="form-control" rows="3" placeholder="Ej: Foto del tensiómetro tomada el martes a la mañana en ayunas..."></textarea>
                </div>

                <div class="d-flex gap-15 justify-between">
                    <a href="{% url 'fotos_mediciones' %}" class="btn-cancelar">Cancelar</a>
                    <button type="submit" class="btn-primary">📤 Enviar Documento</button>
                </div>
            </form>
        </div>
    </div>
</main>
{% endblock %}
