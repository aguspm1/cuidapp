{% extends 'core/base.html' %}
{% load static %}

{% block content %}
<main class="main-content auth-container">
    <div class="card-sobria auth-card">
        <h2 class="card-title text-center m-0">✏️ Editar Evento</h2>
        <p class="text-muted text-center mt-10 mb-30">
            Modificá los datos del evento <strong>{{ evento.titulo }}</strong>.
        </p>

        <form method="POST" class="auth-form-django">
            {% csrf_token %}

            <div class="form-group mb-20">
                <label>Título del Evento</label>
                <input type="text" name="titulo" class="form-control" value="{{ evento.titulo }}" placeholder="Ej: Turno con Cardiólogo" required>
            </div>

            <div class="form-row-2 mb-20">
                <div>
                    <label class="fw-bold mb-10 d-block">Tipo de Evento</label>
                    <select name="tipo" class="form-control" required>
                        <option value="medico"   {% if evento.tipo == 'medico'    %}selected{% endif %}>🩺 Médico / Turno</option>
                        <option value="social"   {% if evento.tipo == 'social'    %}selected{% endif %}>👥 Visita / Social</option>
                        <option value="actividad"{% if evento.tipo == 'actividad' %}selected{% endif %}>🎨 Actividad / Taller</option>
                        <option value="otro"     {% if evento.tipo == 'otro'      %}selected{% endif %}>📌 Otro</option>
                    </select>
                </div>
                <div>
                    <label class="fw-bold mb-10 d-block">Fecha y Hora</label>
                    <input type="datetime-local" name="fecha_hora" class="form-control" value="{{ fecha_iso }}" required>
                </div>
            </div>

            <div class="form-group mb-20">
                <label>Lugar / Dirección</label>
                <input type="text" name="lugar" class="form-control" value="{{ evento.lugar }}" placeholder="Ej: Clínica Santa Lucía">
            </div>

            <div class="form-group mb-30">
                <label>Notas adicionales</label>
                <textarea name="descripcion" rows="4" class="form-control" placeholder="Ej: Llevar estudios previos...">{{ evento.descripcion }}</textarea>
            </div>

            <div class="d-flex gap-15">
                <button type="submit" class="btn-primary">Guardar Cambios</button>
                <a href="{% url 'calendario' %}" class="btn-cancelar">Cancelar</a>
            </div>
        </form>
    </div>
</main>
{% endblock %}
